name: botpoll
# 2026-07-19부터 봇 명령은 Supabase Edge Function 웹훅(즉시 응답)으로 전환됨
# (supabase/functions/telegram-webhook). Telegram은 webhook이 설정된 동안
# getUpdates 폴링을 거부하므로 정기 스케줄은 비활성화하고 수동 실행(디버깅용)만 남긴다.
on:
  workflow_dispatch:

concurrency:
  group: botpoll
  cancel-in-progress: true

jobs:
  botpoll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node src/jobs/botpoll.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
