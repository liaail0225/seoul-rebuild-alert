name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          # 테스트는 순수 함수 위주라 실제 DB에 접속하지 않는다.
          # config.js가 모듈 로드 시점에 필수값 존재만 확인하므로 더미 값으로 충분하다.
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
